<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lato&display=swap" rel="stylesheet">

<style>
body{
background:#080c18;color:#e8dfc8;
font-family:Lato;text-align:center;
padding:20px
}
.mic{
font-size:40px;
margin:20px;
cursor:pointer
}
.heard{
font-family:Amiri;
direction:rtl;
margin:10px;
color:#aaa
}
.text{
font-size:26px;
margin-top:20px
}
</style>
</head>

<body>

<h2>مترجم الصلاة</h2>

<div class="mic" onclick="toggle()">🎤</div>
<div id="status">Tap mic</div>

<div class="heard" id="heard"></div>
<div class="text" id="text">Waiting...</div>

<script>

let listening=false;
let recognition;
let timer;
let last="";

// 🔥 COMMON DUAS DATABASE (FAST + ACCURATE)
const duas = [
{
match:["اللهم اهدنا","اهدنا فيمن هديت"],
translation:"O Allah, guide us among those You have guided."
},
{
match:["وعافنا فيمن عافيت"],
translation:"Grant us well-being among those You have granted well-being."
},
{
match:["وتولنا فيمن توليت"],
translation:"Take us under Your care among those You have taken under Your care."
},
{
match:["وبارك لنا فيما أعطيت"],
translation:"Bless us in what You have given us."
},
{
match:["وقنا شر ما قضيت"],
translation:"Protect us from the evil of what You have decreed."
},
{
match:["إنك تقضي ولا يقضى عليك"],
translation:"Indeed, You decree and none can decree over You."
},
{
match:["إنه لا يذل من واليت"],
translation:"None whom You support will ever be humiliated."
},
{
match:["ولا يعز من عاديت"],
translation:"None whom You oppose will ever be honored."
},
{
match:["تباركت ربنا وتعاليت"],
translation:"Blessed are You, our Lord, and Exalted."
},
{
match:["الله أكبر"],
translation:"Allah is the Greatest."
}
];

// 🎤 START/STOP
function toggle(){
if(!listening){
start();
}else{
stop();
}
}

function start(){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
recognition=new SR();
recognition.lang="ar-SA";
recognition.continuous=true;
recognition.interimResults=true;

recognition.onresult=(e)=>{
for(let i=e.resultIndex;i<e.results.length;i++){
let t=e.results[i][0].transcript.trim();

if(e.results[i].isFinal){
handle(t);
}else{
document.getElementById("heard").textContent=t;

clearTimeout(timer);
timer=setTimeout(()=>{
if(t.length>5){
handle(t);
}
},900);
}
}
};

recognition.start();
listening=true;
document.getElementById("status").textContent="Listening...";
}

function stop(){
recognition.stop();
listening=false;
document.getElementById("status").textContent="Tap mic";
}

// 🧠 MATCH LOGIC
function handle(t){

if(t.length<5) return;
if(t===last) return;

last=t;

document.getElementById("heard").textContent=t;

let found=null;

// try match known duas
for(let d of duas){
for(let m of d.match){
if(t.includes(m)){
found=d.translation;
break;
}
}
if(found) break;
}

// fallback
if(!found){
found="Listening...";
}

show(found);
}

// 🎬 DISPLAY
function show(txt){
let el=document.getElementById("text");
el.style.opacity=0;

setTimeout(()=>{
el.textContent=txt;
el.style.opacity=1;
},100);
}

</script>

</body>
</html>
