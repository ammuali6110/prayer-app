<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a96e;--bg:#080c18;--surface:#0f1623;--border:#1a2a40;
  --border-mid:#2a3f60;--text:#e8dfc8;--text-dim:#6b7a9a;
  --green:#2a9060;--green-dim:#2a6040;--red:#a04040;
}
body{background:var(--bg);font-family:'Lato',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem}
.header{text-align:center;margin-bottom:1.25rem}
.arabic-title{font-family:'Amiri',serif;font-size:26px;color:var(--gold);display:block}
.divider{width:50px;height:1px;background:var(--gold);opacity:.35;margin:.5rem auto}
.english-title{font-size:11px;color:#3a4a6a;letter-spacing:.18em;text-transform:uppercase}
.setup{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border-mid);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem}
.setup.hidden{display:none}
.setup label{font-size:13px;color:var(--text-dim);margin-bottom:8px;display:block}
.setup-row{display:flex;gap:8px}
.setup input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text);font-family:monospace;outline:none}
.setup input:focus{border-color:var(--gold)}
.setup button{background:var(--gold);border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;color:var(--bg);cursor:pointer}
.setup-note{font-size:11px;color:#3a4a6a;margin-top:8px;line-height:1.6}
.mode-row{width:100%;max-width:520px;display:flex;gap:8px;margin-bottom:1rem}
.mode-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:13px;font-family:'Lato',sans-serif;cursor:pointer;text-align:center;transition:all .2s}
.mode-btn.active{background:#1a2a40;border-color:var(--gold);color:var(--gold)}
.mode-title{font-weight:700;display:block;margin-bottom:2px}
.mode-desc{font-size:11px;opacity:.65}
.mic-section{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:1rem}
.mic-btn{width:80px;height:80px;border-radius:50%;background:#111827;border:2px solid #2d3a5e;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;outline:none}
.mic-btn.on{border-color:var(--green-dim);background:#0d1f14;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(42,96,64,.5)}50%{box-shadow:0 0 0 14px rgba(42,96,64,0)}}
.status{font-size:12px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase}
.status.on{color:var(--green)}
.heard-box{width:100%;max-width:520px;background:#0a0f1a;border:1px solid #1a2540;border-radius:8px;padding:8px 12px;margin-bottom:.75rem;font-family:'Amiri',serif;font-size:16px;color:#3a4d70;min-height:38px;text-align:right;direction:rtl;line-height:1.6;transition:color .2s}
.heard-box.lit{color:var(--text-dim)}
.card{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem 1.5rem;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.badge-row{min-height:22px;margin-bottom:.75rem;align-self:flex-start;display:flex;gap:8px;align-items:center}
.surah-badge{background:#1a2a40;border:1px solid #2a4060;border-radius:6px;padding:3px 10px;font-size:12px;color:var(--gold);font-weight:700}
.dua-label{font-size:11px;color:#3a4a6a;font-style:italic}
#mainText{font-size:27px;font-weight:300;color:var(--text);line-height:1.75;text-align:center;width:100%}
.flash{position:absolute;inset:0;background:var(--gold);border-radius:14px;opacity:0;transition:opacity .1s ease;pointer-events:none;z-index:0}
.flash.on{opacity:.13}
.card>:not(.flash){position:relative;z-index:1}
.placeholder{font-size:15px;color:#2a3a5a;text-align:center;line-height:1.9}
.bottom-row{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;margin-top:.75rem}
.left-btns{display:flex;gap:8px}
.text-btn{font-size:11px;color:#3a4a6a;cursor:pointer;background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-family:'Lato',sans-serif}
select{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-size:12px;padding:5px 8px;border-radius:8px;font-family:'Lato',sans-serif;cursor:pointer;outline:none}
.debug{width:100%;max-width:520px;margin-top:.5rem;font-size:11px;font-family:monospace;text-align:center;min-height:16px;color:#3a4a6a}
.debug.err{color:var(--red)}
.disclaimer{width:100%;max-width:520px;margin-top:.5rem;font-size:11px;color:#2a3a5a;text-align:center;line-height:1.6}
</style>
</head>
<body>

<div class="header">
  <span class="arabic-title">مترجم الصلاة</span>
  <div class="divider"></div>
  <span class="english-title">Live Prayer Translator</span>
</div>

<div class="setup" id="setup">
  <label>Enter your Anthropic API key</label>
  <div class="setup-row">
    <input type="password" id="keyInput" placeholder="sk-ant-..."/>
    <button onclick="saveKey()">Activate</button>
  </div>
  <div class="setup-note">Get your key at console.anthropic.com → API Keys. Stored in this browser only.</div>
</div>

<div class="mode-row">
  <button class="mode-btn active" id="modeAyah" onclick="setMode('ayah')">
    <span class="mode-title">Ayah mode</span>
    <span class="mode-desc">Quran verses</span>
  </button>
  <button class="mode-btn" id="modeDua" onclick="setMode('dua')">
    <span class="mode-title">Witr dua mode</span>
    <span class="mode-desc">Qunoot &amp; duas</span>
  </button>
</div>

<div class="mic-section">
  <button class="mic-btn" id="micBtn" onclick="toggleListening()">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <rect x="9" y="2" width="6" height="11" rx="3" fill="#c9a96e"/>
      <path d="M5 11a7 7 0 0 0 14 0" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="12" y1="18" x2="12" y2="22" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="22" x2="15" y2="22" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="status" id="status">Tap to start</div>
</div>

<div class="heard-box" id="heardBox">Listening for Arabic...</div>

<div class="card">
  <div class="flash" id="flash"></div>
  <div class="badge-row">
    <span class="surah-badge" id="surahBadge" style="display:none"></span>
    <span class="dua-label" id="duaLabel"></span>
  </div>
  <div id="mainText"><div class="placeholder">Tap mic and hold near the imam.</div></div>
</div>

<div class="bottom-row">
  <div class="left-btns">
    <button class="text-btn" onclick="changeKey()">Change key</button>
    <button class="text-btn" onclick="clearDisplay()">Clear</button>
  </div>
  <select id="langSelect">
    <option value="English">English</option>
    <option value="Urdu">Urdu</option>
    <option value="French">French</option>
    <option value="Turkish">Turkish</option>
    <option value="Spanish">Spanish</option>
    <option value="Indonesian">Indonesian</option>
    <option value="Bengali">Bengali</option>
  </select>
</div>

<div class="debug" id="debug"></div>
<div class="disclaimer">AI translation for understanding only. Verify with a qualified scholar.</div>

<script>
var isOn=false, recog=null, mode='ayah', activeCall=0;
var displayQueue=[], isDisplaying=false;

var micBtn=document.getElementById('micBtn');
var statusEl=document.getElementById('status');
var heardBox=document.getElementById('heardBox');
var mainText=document.getElementById('mainText');
var surahBadge=document.getElementById('surahBadge');
var duaLabel=document.getElementById('duaLabel');
var debugEl=document.getElementById('debug');
var flashEl=document.getElementById('flash');

function dbg(m,t){debugEl.textContent=m;debugEl.className='debug'+(t?' '+t:'')}
if(localStorage.getItem('prayer_key')) document.getElementById('setup').classList.add('hidden');

function saveKey(){
  var v=document.getElementById('keyInput').value.trim();
  if(!v.startsWith('sk-ant-')){dbg('Key must start with sk-ant-','err');return}
  localStorage.setItem('prayer_key',v);
  document.getElementById('setup').classList.add('hidden');dbg('');
}
function changeKey(){
  localStorage.removeItem('prayer_key');
  document.getElementById('keyInput').value='';
  document.getElementById('setup').classList.remove('hidden');
  if(isOn) toggleListening();
}
function setMode(m){
  mode=m;
  document.getElementById('modeAyah').classList.toggle('active',m==='ayah');
  document.getElementById('modeDua').classList.toggle('active',m==='dua');
  clearAll();
}
function clearAll(){
  activeCall++;displayQueue=[];isDisplaying=false;
  mainText.innerHTML='<div class="placeholder">Tap mic and hold near the imam.</div>';
  surahBadge.style.display='none';duaLabel.textContent='';
  heardBox.textContent='';heardBox.className='heard-box';dbg('');
}

// ── Islamic phrase boundary patterns ──────────────────────────────────────
// These are the words/phrases that START a new dua or praise in Qunoot/Witr.
// When we see these in the middle of a recognition result, we split there.
var SPLIT_STARTERS = [
  // Praise openers
  'سبحانك','سبحان','الحمد لله','الحمدلله','الله أكبر','لا إله إلا الله',
  'لا إله إلا أنت','بسم الله',
  // Dua openers — اللهم constructions
  'اللهم اهدنا','اللهم اهدني','اللهم عافنا','اللهم عافني',
  'اللهم تولنا','اللهم تولني','اللهم بارك لنا','اللهم بارك لي',
  'اللهم قنا','اللهم ارزقنا','اللهم ارزقني','اللهم اغفر لنا',
  'اللهم اغفر لي','اللهم إنا نعوذ','اللهم إني أعوذ',
  'اللهم إنا نسألك','اللهم إني أسألك','اللهم اجعلنا','اللهم اجعلني',
  'اللهم ثبتنا','اللهم ثبتني','اللهم انصرنا','اللهم انصرني',
  'اللهم أصلح','اللهم رحمتك','اللهم إنك','اللهم',
  // Salawat
  'اللهم صل','صلى الله','وصلى الله',
  // Connective praise that starts new unit
  'وله الحمد','وله الشكر','ولا حول','لا حول ولا قوة',
  'أشهد أن','وأشهد أن',
  // Ameen cue words — end markers
  'آمين','أمين'
];

// Build a regex that matches any starter at a word boundary
// We'll use it to find split points inside a long string
function buildSplitRegex(){
  var escaped = SPLIT_STARTERS.map(function(s){
    return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  });
  // Sort longest first so longer matches win
  escaped.sort(function(a,b){return b.length-a.length});
  return new RegExp('(?:^|\\s)('+escaped.join('|')+')','g');
}
var SPLIT_RE = buildSplitRegex();

function splitIntoPhrases(text){
  text=text.trim();
  if(!text) return [];

  // Find all positions where a starter word begins
  var positions=[];
  var m;
  SPLIT_RE.lastIndex=0;
  while((m=SPLIT_RE.exec(text))!==null){
    // m.index is where the space before the word is; m.index+m[0].indexOf(m[1]) is the word
    var wordStart=m.index+(m[0].length-m[1].length);
    if(wordStart>0) positions.push(wordStart);
  }

  if(positions.length===0) return [text];

  var phrases=[];
  var last=0;
  for(var i=0;i<positions.length;i++){
    var chunk=text.slice(last,positions[i]).trim();
    if(chunk.length>1) phrases.push(chunk);
    last=positions[i];
  }
  var final=text.slice(last).trim();
  if(final.length>1) phrases.push(final);

  return phrases.length>0 ? phrases : [text];
}

// ── Display queue — show one phrase at a time, replace on next ────────────
function enqueueAndDisplay(phrases){
  for(var i=0;i<phrases.length;i++) displayQueue.push(phrases[i]);
  pumpQueue();
}

function pumpQueue(){
  if(isDisplaying||displayQueue.length===0) return;
  isDisplaying=true;
  showNextFromQueue();
}

function showNextFromQueue(){
  if(displayQueue.length===0){isDisplaying=false;return}
  var phrase=displayQueue.shift();
  translateAndStream(phrase,function(){
    // After this phrase finishes streaming, wait a moment then show next
    // The "moment" is how long they have to read it — but we move on as soon
    // as the next phrase is ready, so effectively it's instant replacement
    setTimeout(showNextFromQueue, displayQueue.length>0 ? 200 : 0);
  });
}

// ── Streaming translation ─────────────────────────────────────────────────
var SYS_DUA=[
  'You are an expert Islamic scholar translating live Witr prayer (Qunoot/duas).',
  'Translate the single Arabic phrase to the target language.',
  'Reply ONLY with raw JSON (no markdown): {"t":"<one complete sentence>","l":"<Praise|Supplication|Glorification|Salawat|Qunoot>"}',
  'One complete natural sentence. No fragments. No X/Y alternatives. Commit to one translation.'
].join('\n');

var SYS_AYAH=[
  'You are an expert Quran translator translating live recitation.',
  'Translate the single Arabic phrase to the target language.',
  'Reply ONLY with raw JSON (no markdown): {"t":"<one complete sentence>","s":"<surah English name or empty>","a":"<ayah number or empty>"}',
  'One complete natural sentence. No fragments. No X/Y alternatives. Commit to one translation.'
].join('\n');

function translateAndStream(arabic, onDone){
  var key=localStorage.getItem('prayer_key');
  if(!key){if(onDone)onDone();return}
  var lang=document.getElementById('langSelect').value;
  var myCall=++activeCall;

  heardBox.textContent=arabic;
  heardBox.classList.add('lit');
  mainText.textContent='';
  surahBadge.style.display='none';
  duaLabel.textContent='';

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:150,
      stream:true,
      system:mode==='dua'?SYS_DUA:SYS_AYAH,
      messages:[{role:'user',content:'Language: '+lang+'\nArabic: '+arabic}]
    })
  })
  .then(function(res){
    if(myCall!==activeCall){if(onDone)onDone();return}
    if(!res.ok){dbg('API '+res.status,'err');if(onDone)onDone();return}

    var reader=res.body.getReader();
    var decoder=new TextDecoder();
    var buf='',json='',flashed=false;

    function pump(){
      reader.read().then(function(chunk){
        if(myCall!==activeCall){if(onDone)onDone();return}
        if(chunk.done){
          // Parse complete JSON for label/surah
          try{
            var p=JSON.parse(json.replace(/```json|```/g,'').trim());
            var lbl=p.l||p.label||'';
            var sur=p.s||p.surah||'';
            var ay=p.a||p.ayah||'';
            if(lbl) duaLabel.textContent=lbl;
            if(mode==='ayah'&&sur){
              surahBadge.textContent=sur+(ay?' · '+ay:'');
              surahBadge.style.display='';
            }
          }catch(e){}
          if(onDone)onDone();
          return;
        }

        buf+=decoder.decode(chunk.value,{stream:true});
        var lines=buf.split('\n');
        buf=lines.pop();

        for(var i=0;i<lines.length;i++){
          var line=lines[i].trim();
          if(!line.startsWith('data:')) continue;
          var data=line.slice(5).trim();
          if(data==='[DONE]') continue;
          try{
            var evt=JSON.parse(data);
            if(evt.type==='content_block_delta'&&evt.delta&&evt.delta.text){
              json+=evt.delta.text;
              // Extract streaming translation value
              var m=json.match(/"t"\s*:\s*"((?:[^"\\]|\\.)*)"/);
              if(m){
                var partial=m[1].replace(/\\"/g,'"').replace(/\\n/g,' ').trim();
                if(partial){
                  if(!flashed){flashed=true;flashEl.classList.add('on');setTimeout(function(){flashEl.classList.remove('on')},300)}
                  mainText.textContent=partial;
                  mainText.style.fontSize=partial.length>120?'19px':partial.length>70?'23px':'27px';
                }
              }
            }
          }catch(e){}
        }
        pump();
      }).catch(function(e){dbg(e.message,'err');if(onDone)onDone()});
    }
    pump();
  })
  .catch(function(e){dbg(e.message,'err');if(onDone)onDone()});
}

// ── Speech recognition ────────────────────────────────────────────────────
function startRecog(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){dbg('Use Chrome','err');return}
  recog=new SR();
  recog.lang='ar-SA';
  recog.continuous=true;
  recog.interimResults=true;
  recog.maxAlternatives=1;

  recog.onresult=function(e){
    for(var i=e.resultIndex;i<e.results.length;i++){
      var t=e.results[i][0].transcript.trim();
      if(!t) continue;

      if(e.results[i].isFinal){
        // Split on Islamic phrase boundaries, translate each separately
        var phrases=splitIntoPhrases(t);
        enqueueAndDisplay(phrases);
      } else {
        heardBox.textContent=t;
        heardBox.classList.add('lit');
      }
    }
  };

  recog.onerror=function(e){
    if(e.error==='no-speech') return;
    if(e.error==='not-allowed'){
      dbg('Mic blocked — allow in browser','err');
      isOn=false;micBtn.className='mic-btn';
      statusEl.className='status';statusEl.textContent='Tap to start';
    }
  };

  recog.onend=function(){
    if(isOn) setTimeout(function(){try{recog.start()}catch(e){}},80);
  };

  try{recog.start()}catch(e){dbg('Mic error: '+e.message,'err')}
}

function toggleListening(){
  if(!localStorage.getItem('prayer_key')){dbg('Enter API key first','err');return}
  if(!isOn){
    isOn=true;activeCall++;
    displayQueue=[];isDisplaying=false;
    micBtn.className='mic-btn on';
    statusEl.className='status on';
    statusEl.textContent='Listening...';
    heardBox.textContent='Hold near imam...';
    heardBox.className='heard-box';
    startRecog();
  } else {
    isOn=false;activeCall++;
    displayQueue=[];isDisplaying=false;
    if(recog){recog.onend=null;recog.stop();recog=null}
    micBtn.className='mic-btn';
    statusEl.className='status';
    statusEl.textContent='Tap to start';
    heardBox.textContent='';heardBox.className='heard-box';
    dbg('');
  }
}
</script>
</body>
</html>
