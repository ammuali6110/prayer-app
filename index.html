<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080c18; font-family: 'Lato', sans-serif; color: #e8dfc8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem; }
.header { text-align: center; margin-bottom: 1.25rem; }
.arabic-title { font-family: 'Amiri', serif; font-size: 26px; color: #c9a96e; display: block; }
.divider { width: 50px; height: 1px; background: #c9a96e; opacity: 0.4; margin: 0.5rem auto; }
.english-title { font-size: 11px; color: #4a5a7a; letter-spacing: 0.15em; text-transform: uppercase; }
.setup { width: 100%; max-width: 520px; background: #0f1623; border: 1px solid #2a3f60; border-radius: 14px; padding: 1.25rem; margin-bottom: 1.25rem; }
.setup.hidden { display: none; }
.setup label { font-size: 13px; color: #6b7a9a; margin-bottom: 8px; display: block; }
.setup-row { display: flex; gap: 8px; }
.setup input { flex: 1; background: #080c18; border: 1px solid #1a2a40; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #e8dfc8; font-family: monospace; outline: none; }
.setup input:focus { border-color: #c9a96e; }
.setup button { background: #c9a96e; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 700; color: #080c18; cursor: pointer; white-space: nowrap; }
.setup-note { font-size: 11px; color: #3a4a6a; margin-top: 8px; line-height: 1.6; }
.mode-row { width: 100%; max-width: 520px; display: flex; gap: 8px; margin-bottom: 1rem; }
.mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #1a2a40; background: #0f1623; color: #4a5a7a; font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; text-align: center; transition: all 0.2s; }
.mode-btn.active { background: #1a2a40; border-color: #c9a96e; color: #c9a96e; }
.mode-title { font-weight: 700; display: block; margin-bottom: 2px; }
.mode-desc { font-size: 11px; opacity: 0.7; }
.mic-section { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 1rem; }
.mic-btn { width: 80px; height: 80px; border-radius: 50%; background: #111827; border: 2px solid #2d3a5e; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; outline: none; }
.mic-btn.listening { border-color: #2a6040; background: #0d1f14; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(42,96,64,0.5);}50%{box-shadow:0 0 0 14px rgba(42,96,64,0);} }
.status { font-size: 12px; color: #6b7a9a; letter-spacing: 0.08em; text-transform: uppercase; }
.status.listening { color: #2a9060; }
.heard-box { width: 100%; max-width: 520px; background: #0a0f1a; border: 1px solid #1a2540; border-radius: 8px; padding: 8px 12px; margin-bottom: 0.75rem; font-family: 'Amiri', serif; font-size: 15px; color: #4a5a7a; min-height: 36px; text-align: right; direction: rtl; line-height: 1.6; }
.card { width: 100%; max-width: 520px; background: #0f1623; border: 1px solid #1a2a40; border-radius: 14px; padding: 2rem 1.5rem; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.badge-row { min-height: 20px; margin-bottom: 0.75rem; align-self: flex-start; display: flex; gap: 8px; align-items: center; }
.surah-badge { background: #1a2a40; border: 1px solid #2a4060; border-radius: 6px; padding: 3px 10px; font-size: 12px; color: #c9a96e; font-weight: 700; }
.dua-label { font-size: 11px; color: #3a4a6a; }
#mainText { font-size: 28px; font-weight: 300; color: #e8dfc8; line-height: 1.7; text-align: center; width: 100%; transition: opacity 0.2s; }
.placeholder { font-size: 15px; color: #2a3a5a; text-align: center; line-height: 1.9; }
.bottom-row { width: 100%; max-width: 520px; display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; }
.left-btns { display: flex; gap: 8px; align-items: center; }
.text-btn { font-size: 11px; color: #3a4a6a; cursor: pointer; background: none; border: 1px solid #1a2a40; border-radius: 6px; padding: 4px 10px; font-family: 'Lato', sans-serif; }
select { background: #0f1623; border: 1px solid #1a2a40; color: #6b7a9a; font-size: 12px; padding: 5px 8px; border-radius: 8px; font-family: 'Lato', sans-serif; cursor: pointer; outline: none; }
.debug { width: 100%; max-width: 520px; margin-top: 0.5rem; font-size: 11px; font-family: monospace; text-align: center; min-height: 16px; color: #3a4a6a; }
.debug.err { color: #a04040; }
.disclaimer { width: 100%; max-width: 520px; margin-top: 0.5rem; font-size: 11px; color: #2a3a5a; text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <span class="arabic-title">مترجم الصلاة</span>
  <div class="divider"></div>
  <span class="english-title">Live Prayer Translator</span>
</div>

<div class="setup" id="setup">
  <label>Enter your Anthropic API key</label>
  <div class="setup-row">
    <input type="password" id="keyInput" placeholder="sk-ant-..." />
    <button onclick="saveKey()">Activate</button>
  </div>
  <div class="setup-note">Get your key at console.anthropic.com → API Keys. Your key is saved in this browser only.</div>
</div>

<div class="mode-row">
  <button class="mode-btn active" id="modeAyah" onclick="setMode('ayah')">
    <span class="mode-title">Ayah mode</span>
    <span class="mode-desc">Quran verses</span>
  </button>
  <button class="mode-btn" id="modeDua" onclick="setMode('dua')">
    <span class="mode-title">Witr dua mode</span>
    <span class="mode-desc">Qunoot & duas</span>
  </button>
</div>

<div class="mic-section">
  <button class="mic-btn" id="micBtn" onclick="toggleListening()">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <rect x="9" y="2" width="6" height="11" rx="3" fill="#c9a96e"/>
      <path d="M5 11a7 7 0 0 0 14 0" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="12" y1="18" x2="12" y2="22" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="22" x2="15" y2="22" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="status" id="status">Tap microphone to begin</div>
</div>

<div class="heard-box" id="heardBox">Listening for Arabic...</div>

<div class="card">
  <div class="badge-row">
    <span class="surah-badge" id="surahBadge" style="display:none"></span>
    <span class="dua-label" id="duaLabel"></span>
  </div>
  <div id="mainText"><div class="placeholder">Tap mic and hold near the imam.</div></div>
</div>

<div class="bottom-row">
  <div class="left-btns">
    <button class="text-btn" onclick="changeKey()">Change key</button>
    <button class="text-btn" onclick="clearDisplay()">Clear</button>
  </div>
  <select id="langSelect">
    <option value="English">English</option>
    <option value="Urdu">Urdu</option>
    <option value="French">French</option>
    <option value="Turkish">Turkish</option>
    <option value="Spanish">Spanish</option>
    <option value="Indonesian">Indonesian</option>
    <option value="Bengali">Bengali</option>
  </select>
</div>

<div class="debug" id="debug"></div>
<div class="disclaimer">AI translation for understanding only. Verify with a qualified scholar.</div>

<script>
let isListening = false;
let recognition = null;
let mode = 'ayah';

const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const heardBox = document.getElementById('heardBox');
const mainText = document.getElementById('mainText');
const surahBadge = document.getElementById('surahBadge');
const duaLabel = document.getElementById('duaLabel');
const debugEl = document.getElementById('debug');

function dbg(msg, type) { debugEl.textContent = msg; debugEl.className = 'debug' + (type ? ' ' + type : ''); }

const saved = localStorage.getItem('prayer_key');
if (saved) { document.getElementById('setup').classList.add('hidden'); }

function saveKey() {
  const v = document.getElementById('keyInput').value.trim();
  if (!v.startsWith('sk-ant-')) { dbg('Key must start with sk-ant-', 'err'); return; }
  localStorage.setItem('prayer_key', v);
  document.getElementById('setup').classList.add('hidden');
  dbg('Key saved. Ready.', '');
}

function changeKey() {
  localStorage.removeItem('prayer_key');
  document.getElementById('keyInput').value = '';
  document.getElementById('setup').classList.remove('hidden');
  if (isListening) toggleListening();
}

function setMode(m) {
  mode = m;
  document.getElementById('modeAyah').classList.toggle('active', m === 'ayah');
  document.getElementById('modeDua').classList.toggle('active', m === 'dua');
  clearDisplay();
}

function clearDisplay() {
  mainText.style.opacity = '1';
  mainText.innerHTML = '<div class="placeholder">Tap mic and hold near the imam.</div>';
  surahBadge.style.display = 'none';
  duaLabel.textContent = '';
  heardBox.textContent = 'Listening for Arabic...';
  dbg('');
}

function show(text, label, surah, ayah) {
  mainText.style.opacity = '0';
  setTimeout(() => { mainText.textContent = text; mainText.style.opacity = '1'; }, 150);
  if (surah && surah !== 'Unknown' && surah !== '') {
    surahBadge.textContent = surah; surahBadge.style.display = 'inline-block';
    duaLabel.textContent = ayah ? 'Ayah ' + ayah : '';
  } else {
    surahBadge.style.display = 'none';
    duaLabel.textContent = label || (mode === 'dua' ? 'Witr Dua' : '');
  }
}

async function translate(arabic) {
  if (!arabic || arabic.trim().length < 2) return;
  const key = localStorage.getItem('prayer_key');
  if (!key) { dbg('No API key saved', 'err'); return; }
  const lang = document.getElementById('langSelect').value;
  dbg('Translating...');

  const prompt = mode === 'dua'
    ? `You are an expert Islamic scholar specializing in Witr prayer and Qunoot supplications. You know all four madhabs, all regional imam styles (Arab, Pakistani, Indian, Turkish, African, Southeast Asian), and all common qunoot duas. The text below was captured by speech recognition and may have minor errors — correct them. Translate completely and naturally. Arabic: "${arabic}"\nRespond ONLY raw JSON no markdown: {"arabic":"<corrected>","translation":"<complete natural ${lang} translation>","label":"<Praise or Qunoot or Dua>"}`
    : `Quran translator. Arabic heard from imam: "${arabic}"\nRespond ONLY raw JSON no markdown: {"arabic":"<corrected>","translation":"<${lang} translation>","surah":"<surah name or empty>","ayah":"<number or empty>"}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      dbg('API error: ' + (e.error?.message || res.status), 'err');
      if (res.status === 401) changeKey();
      return;
    }

    const data = await res.json();
    const raw = data.content.map(i => i.text || '').join('');
    const result = JSON.parse(raw.replace(/```json|```/g, '').trim());
    if (result.translation) {
      show(result.translation, result.label, result.surah, result.ayah);
      heardBox.textContent = result.arabic || arabic;
      dbg('');
    }
  } catch(e) {
    dbg('Error: ' + e.message, 'err');
  }
}

function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { dbg('Use Chrome browser', 'err'); return; }

  recognition = new SR();
  recognition.lang = 'ar-SA';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript.trim();
      if (event.results[i].isFinal) {
        if (t.length > 1) { heardBox.textContent = t; translate(t); }
      } else {
        heardBox.textContent = t;
      }
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') { dbg('Mic blocked — allow in Chrome settings', 'err'); isListening = false; micBtn.className = 'mic-btn'; statusEl.className = 'status'; statusEl.textContent = 'Tap microphone to begin'; }
  };

  recognition.onend = () => {
    if (isListening) {
      setTimeout(() => {
        try { recognition.start(); } catch(e) {}
      }, 100);
    }
  };
  try { recognition.start(); } catch(e) { dbg('Mic error: ' + e.message, 'err'); }
}

function toggleListening() {
  if (!localStorage.getItem('prayer_key')) { dbg('Enter API key first', 'err'); return; }
  if (!isListening) {
    isListening = true;
    micBtn.className = 'mic-btn listening';
    statusEl.className = 'status listening';
    statusEl.textContent = 'Listening...';
    heardBox.textContent = 'Mic active — hold near imam...';
    startRecognition();
  } else {
    isListening = false;
    if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
    micBtn.className = 'mic-btn';
    statusEl.className = 'status';
    statusEl.textContent = 'Tap microphone to begin';
    heardBox.textContent = '';
    dbg('');
  }
}
</script>
</body>
</html>
