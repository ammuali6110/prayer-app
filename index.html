<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #c9a96e; --gold-dim: #7a6040; --bg: #080c18;
  --surface: #0f1623; --border: #1a2a40; --border-mid: #2a3f60;
  --text: #e8dfc8; --text-dim: #6b7a9a; --green: #2a9060;
  --green-dim: #2a6040; --red: #a04040;
}
body { background: var(--bg); font-family: 'Lato', sans-serif; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem 2rem; }
.header { text-align: center; margin-bottom: 1.25rem; }
.arabic-title { font-family: 'Amiri', serif; font-size: 26px; color: var(--gold); display: block; }
.divider { width: 50px; height: 1px; background: var(--gold); opacity: 0.35; margin: 0.5rem auto; }
.english-title { font-size: 11px; color: #3a4a6a; letter-spacing: 0.18em; text-transform: uppercase; }
.setup { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border-mid); border-radius: 14px; padding: 1.25rem; margin-bottom: 1.25rem; }
.setup.hidden { display: none; }
.setup label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; display: block; }
.setup-row { display: flex; gap: 8px; }
.setup input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--text); font-family: monospace; outline: none; }
.setup input:focus { border-color: var(--gold); }
.setup button { background: var(--gold); border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 700; color: var(--bg); cursor: pointer; }
.setup-note { font-size: 11px; color: #3a4a6a; margin-top: 8px; line-height: 1.6; }
.mode-row { width: 100%; max-width: 520px; display: flex; gap: 8px; margin-bottom: 1rem; }
.mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); font-size: 13px; font-family: 'Lato', sans-serif; cursor: pointer; text-align: center; transition: all 0.2s; }
.mode-btn.active { background: #1a2a40; border-color: var(--gold); color: var(--gold); }
.mode-title { font-weight: 700; display: block; margin-bottom: 2px; }
.mode-desc { font-size: 11px; opacity: 0.65; }
.mic-section { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 1rem; }
.mic-btn { width: 80px; height: 80px; border-radius: 50%; background: #111827; border: 2px solid #2d3a5e; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; outline: none; }
.mic-btn.listening { border-color: var(--green-dim); background: #0d1f14; animation: pulse 1.5s ease-in-out infinite; }
.mic-btn.translating { border-color: var(--gold-dim); background: #1a140a; animation: pulse-gold 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(42,96,64,0.5);}50%{box-shadow:0 0 0 14px rgba(42,96,64,0);} }
@keyframes pulse-gold { 0%,100%{box-shadow:0 0 0 0 rgba(201,169,110,0.35);}50%{box-shadow:0 0 0 12px rgba(201,169,110,0);} }
.status { font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
.status.listening { color: var(--green); }
.status.translating { color: var(--gold); }
.heard-box { width: 100%; max-width: 520px; background: #0a0f1a; border: 1px solid #1a2540; border-radius: 8px; padding: 8px 12px; margin-bottom: 0.75rem; font-family: 'Amiri', serif; font-size: 16px; color: #3a4d70; min-height: 38px; text-align: right; direction: rtl; line-height: 1.6; transition: color 0.3s; }
.heard-box.active { color: var(--text-dim); }
.card { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem 1.5rem; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.badge-row { min-height: 22px; margin-bottom: 0.75rem; align-self: flex-start; display: flex; gap: 8px; align-items: center; }
.surah-badge { background: #1a2a40; border: 1px solid #2a4060; border-radius: 6px; padding: 3px 10px; font-size: 12px; color: var(--gold); font-weight: 700; }
.dua-label { font-size: 11px; color: #3a4a6a; font-style: italic; }
#mainText { font-size: 27px; font-weight: 300; color: var(--text); line-height: 1.75; text-align: center; width: 100%; transition: opacity 0.1s ease; }
#mainText.fading { opacity: 0; }
.card-flash { position: absolute; inset: 0; background: var(--gold); border-radius: 14px; opacity: 0; transition: opacity 0.12s ease; pointer-events: none; z-index: 0; }
.card-flash.on { opacity: 0.12; }
.card > :not(.card-flash) { position: relative; z-index: 1; }
.placeholder { font-size: 15px; color: #2a3a5a; text-align: center; line-height: 1.9; }
.bottom-row { width: 100%; max-width: 520px; display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; }
.left-btns { display: flex; gap: 8px; align-items: center; }
.text-btn { font-size: 11px; color: #3a4a6a; cursor: pointer; background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-family: 'Lato', sans-serif; }
select { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); font-size: 12px; padding: 5px 8px; border-radius: 8px; font-family: 'Lato', sans-serif; cursor: pointer; outline: none; }
.debug { width: 100%; max-width: 520px; margin-top: 0.5rem; font-size: 11px; font-family: monospace; text-align: center; min-height: 16px; color: #3a4a6a; }
.debug.err { color: var(--red); }
.disclaimer { width: 100%; max-width: 520px; margin-top: 0.5rem; font-size: 11px; color: #2a3a5a; text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <span class="arabic-title">مترجم الصلاة</span>
  <div class="divider"></div>
  <span class="english-title">Live Prayer Translator</span>
</div>

<div class="setup" id="setup">
  <label>Enter your Anthropic API key</label>
  <div class="setup-row">
    <input type="password" id="keyInput" placeholder="sk-ant-..." />
    <button onclick="saveKey()">Activate</button>
  </div>
  <div class="setup-note">Get your key at console.anthropic.com → API Keys. Stored in this browser only.</div>
</div>

<div class="mode-row">
  <button class="mode-btn active" id="modeAyah" onclick="setMode('ayah')">
    <span class="mode-title">Ayah mode</span>
    <span class="mode-desc">Quran verses</span>
  </button>
  <button class="mode-btn" id="modeDua" onclick="setMode('dua')">
    <span class="mode-title">Witr dua mode</span>
    <span class="mode-desc">Qunoot &amp; duas</span>
  </button>
</div>

<div class="mic-section">
  <button class="mic-btn" id="micBtn" onclick="toggleListening()">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <rect x="9" y="2" width="6" height="11" rx="3" fill="#c9a96e"/>
      <path d="M5 11a7 7 0 0 0 14 0" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="12" y1="18" x2="12" y2="22" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="22" x2="15" y2="22" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="status" id="status">Tap microphone to begin</div>
</div>

<div class="heard-box" id="heardBox">Listening for Arabic...</div>

<div class="card">
  <div class="card-flash" id="cardFlash"></div>
  <div class="badge-row">
    <span class="surah-badge" id="surahBadge" style="display:none"></span>
    <span class="dua-label" id="duaLabel"></span>
  </div>
  <div id="mainText"><div class="placeholder">Tap mic and hold near the imam.</div></div>
</div>

<div class="bottom-row">
  <div class="left-btns">
    <button class="text-btn" onclick="changeKey()">Change key</button>
    <button class="text-btn" onclick="clearDisplay()">Clear</button>
  </div>
  <select id="langSelect">
    <option value="English">English</option>
    <option value="Urdu">Urdu</option>
    <option value="French">French</option>
    <option value="Turkish">Turkish</option>
    <option value="Spanish">Spanish</option>
    <option value="Indonesian">Indonesian</option>
    <option value="Bengali">Bengali</option>
  </select>
</div>

<div class="debug" id="debug"></div>
<div class="disclaimer">AI translation for understanding only. Verify with a qualified scholar.</div>

<script>
let isListening  = false;
let recognition  = null;
let mode         = 'ayah';

// Each final result fires its own independent translation call.
// We track a "generation" counter so only the latest call updates the screen.
let generation   = 0;

// Accumulate finals within one breath group, reset on long silence
let breathBuffer = '';
let breathTimer  = null;
const BREATH_MS  = 1800; // if silent this long, next speech is a new phrase

const micBtn     = document.getElementById('micBtn');
const statusEl   = document.getElementById('status');
const heardBox   = document.getElementById('heardBox');
const mainText   = document.getElementById('mainText');
const surahBadge = document.getElementById('surahBadge');
const duaLabel   = document.getElementById('duaLabel');
const debugEl    = document.getElementById('debug');
const cardFlash  = document.getElementById('cardFlash');

function dbg(msg, type) {
  debugEl.textContent = msg;
  debugEl.className = 'debug' + (type ? ' ' + type : '');
}

if (localStorage.getItem('prayer_key')) document.getElementById('setup').classList.add('hidden');

function saveKey() {
  const v = document.getElementById('keyInput').value.trim();
  if (!v.startsWith('sk-ant-')) { dbg('Key must start with sk-ant-', 'err'); return; }
  localStorage.setItem('prayer_key', v);
  document.getElementById('setup').classList.add('hidden');
  dbg('');
}
function changeKey() {
  localStorage.removeItem('prayer_key');
  document.getElementById('keyInput').value = '';
  document.getElementById('setup').classList.remove('hidden');
  if (isListening) toggleListening();
}
function setMode(m) {
  mode = m;
  document.getElementById('modeAyah').classList.toggle('active', m === 'ayah');
  document.getElementById('modeDua').classList.toggle('active', m === 'dua');
  clearDisplay();
}
function clearDisplay() {
  generation++;
  breathBuffer = '';
  clearTimeout(breathTimer);
  mainText.style.opacity = '1';
  mainText.innerHTML = '<div class="placeholder">Tap mic and hold near the imam.</div>';
  surahBadge.style.display = 'none';
  duaLabel.textContent = '';
  heardBox.textContent = '';
  heardBox.className = 'heard-box';
  dbg('');
}

function showTranslation(translation, label, surah, ayah) {
  cardFlash.classList.add('on');
  setTimeout(function() { cardFlash.classList.remove('on'); }, 300);
  mainText.classList.add('fading');
  setTimeout(function() {
    mainText.textContent = translation;
    mainText.style.fontSize = translation.length > 120 ? '20px' : translation.length > 70 ? '23px' : '27px';
    mainText.classList.remove('fading');
    if (mode === 'ayah' && surah) {
      surahBadge.textContent = surah + (ayah ? ' \u00b7 ' + ayah : '');
      surahBadge.style.display = '';
    } else {
      surahBadge.style.display = 'none';
    }
    duaLabel.textContent = label || '';
  }, 100);
}

const SYSTEM = {
  dua: `You are an expert Islamic scholar. Translate ONE Arabic phrase from Witr prayer (Qunoot/dua) into natural fluent English (or requested language).
Output ONLY raw JSON: {"translation":"...","label":"..."}
Rules: ONE complete natural sentence. No fragments. No "X / Y" alternatives. Commit to the single best translation.
label = one word only: Praise OR Supplication OR Glorification OR Salawat OR Qunoot`,

  ayah: `You are an expert Quran translator. Translate ONE Arabic Quran phrase into natural fluent English (or requested language).
Output ONLY raw JSON: {"translation":"...","surah":"...","ayah":"..."}
Rules: ONE complete natural sentence. No fragments. No "X / Y" alternatives. Commit to the single best translation.
surah = English name if known, else "". ayah = number if known, else "".`
};

async function translate(arabic, myGen) {
  const key = localStorage.getItem('prayer_key');
  if (!key || !arabic || arabic.trim().length < 3) return;
  const lang = document.getElementById('langSelect').value;

  const prompt = mode === 'dua'
    ? 'Translate into ' + lang + '. Return ONLY JSON {"translation":"<complete sentence>","label":"<Praise|Supplication|Glorification|Salawat|Qunoot>"}.\n\nArabic: ' + arabic
    : 'Translate into ' + lang + '. Return ONLY JSON {"translation":"<complete sentence>","surah":"<name or empty>","ayah":"<number or empty>"}.\n\nArabic: ' + arabic;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 200,
        system: mode === 'dua' ? SYSTEM.dua : SYSTEM.ayah,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    // If a newer phrase came in while we were waiting, discard this result
    if (myGen !== generation) return;

    if (!res.ok) {
      const e = await res.json().catch(function() { return {}; });
      dbg('API error: ' + (e.error && e.error.message ? e.error.message : res.status), 'err');
      return;
    }

    const data = await res.json();
    if (myGen !== generation) return; // check again after await

    const raw = data.content.map(function(i) { return i.text || ''; }).join('').replace(/```json|```/g, '').trim();
    let p;
    try { p = JSON.parse(raw); } catch(e) { dbg('Parse error', 'err'); return; }

    if (p && p.translation && p.translation.trim()) {
      showTranslation(p.translation.trim(), p.label || '', p.surah || '', p.ayah || '');
      dbg('');
    }
  } catch(e) {
    if (myGen === generation) dbg('Error: ' + e.message, 'err');
  }
}

function onFinalResult(text) {
  if (!text || text.trim().length < 2) return;

  // Reset breath timer — if silence follows, next speech is a new breath group
  clearTimeout(breathTimer);
  breathBuffer += (breathBuffer ? ' ' : '') + text.trim();
  breathTimer = setTimeout(function() { breathBuffer = ''; }, BREATH_MS);

  // Bump generation — any in-flight older call will see myGen !== generation and discard itself
  generation++;
  var myGen = generation;

  // Show what we heard immediately
  heardBox.textContent = breathBuffer;
  heardBox.classList.add('active');

  // Set mic to translating state
  micBtn.className = 'mic-btn translating';
  statusEl.className = 'status translating';
  statusEl.textContent = 'Translating...';

  // Fire translation immediately — don't wait
  translate(breathBuffer, myGen).then(function() {
    if (isListening && myGen === generation) {
      micBtn.className = 'mic-btn listening';
      statusEl.className = 'status listening';
      statusEl.textContent = 'Listening...';
    }
  });
}

function startRecognition() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { dbg('Use Chrome browser', 'err'); return; }

  recognition = new SR();
  recognition.lang = 'ar-SA';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = function(event) {
    for (var i = event.resultIndex; i < event.results.length; i++) {
      var t = event.results[i][0].transcript.trim();
      if (!t) continue;

      if (event.results[i].isFinal) {
        // Final = committed speech, fire translation immediately
        onFinalResult(t);
      } else {
        // Interim = show live in heard box only, don't translate yet
        var live = (breathBuffer ? breathBuffer + ' ' : '') + t;
        heardBox.textContent = live;
        heardBox.classList.add('active');
      }
    }
  };

  recognition.onerror = function(e) {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') {
      dbg('Microphone blocked — allow mic in browser', 'err');
      isListening = false;
      micBtn.className = 'mic-btn';
      statusEl.className = 'status';
      statusEl.textContent = 'Tap microphone to begin';
    }
  };

  recognition.onend = function() {
    if (isListening) setTimeout(function() { try { recognition.start(); } catch(e) {} }, 100);
  };

  try { recognition.start(); } catch(e) { dbg('Mic error: ' + e.message, 'err'); }
}

function toggleListening() {
  if (!localStorage.getItem('prayer_key')) { dbg('Enter API key first', 'err'); return; }

  if (!isListening) {
    isListening = true;
    generation++;
    breathBuffer = '';
    clearTimeout(breathTimer);
    micBtn.className = 'mic-btn listening';
    statusEl.className = 'status listening';
    statusEl.textContent = 'Listening...';
    heardBox.textContent = 'Mic active — hold near imam...';
    heardBox.classList.remove('active');
    startRecognition();
  } else {
    isListening = false;
    generation++;
    clearTimeout(breathTimer);
    if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
    micBtn.className = 'mic-btn';
    statusEl.className = 'status';
    statusEl.textContent = 'Tap microphone to begin';
    heardBox.textContent = '';
    heardBox.classList.remove('active');
    dbg('');
  }
}
</script>
</body>
</html>
